<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .grid { 
            display: grid; 
            grid-template-columns: 60px repeat(7, 1fr); 
            gap: 1px; 
            background: #ccc; 
            border: 1px solid #ccc; 
        }
        .cell { 
            background: white; 
            min-height: 45px; 
            padding: 2px; 
            font-size: 10px; 
            border: 0.5px solid #eee; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .header { background: #f8f9fa; font-weight: bold; height: 30px; }
        
        /* Стили из твоего ТЗ */
        .not-working { background: #d1d1d1 !important; color: #757575; }
        .busy { background: #fff3e0 !important; color: #e65100; border-left: 2px solid #ff9800; }
        .free { background: white; cursor: pointer; transition: 0.2s; }
        .free:active { background: #e3f2fd; }
        
        .time-label { background: #f8f9fa; font-weight: bold; font-size: 11px; }
        .user-name { font-size: 8px; color: #555; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="grid" id="calendar">
        <!-- Шапка дней недели -->
        <div class="cell header"></div>
        <div class="cell header">Пн</div><div class="cell header">Вт</div><div class="cell header">Ср</div>
        <div class="cell header">Чт</div><div class="cell header">Пт</div><div class="cell header">Сб</div><div class="cell header">Вс</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        const role = urlParams.get('role'); // Получаем роль: tutor или student
        const schedule = JSON.parse(decodeURIComponent(rawData));

        const container = document.getElementById('calendar');
        const hours = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];
        const days = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

        hours.forEach(hour => {
            let timeCell = document.createElement('div');
            timeCell.className = 'cell time-label';
            timeCell.innerText = hour;
            container.appendChild(timeCell);

            days.forEach(day => {
                let cell = document.createElement('div');
                cell.className = 'cell';
                
                let slot = schedule.find(s => s.day === day && s.time.startsWith(hour));
                
                if (slot) {
                    // Отрисовка статусов
                    if (slot.status === 'Не работает') {
                        cell.classList.add('not-working');
                        cell.innerText = "Не работает";
                    } else if (slot.status === 'Занято') {
                        cell.classList.add('busy');
                        // Репетитор видит имя студента, если оно есть
                        let label = (role === 'tutor' && slot.name) ? slot.name : "Занято";
                        cell.innerHTML = `<span>${label}</span>`;
                    } else if (slot.status === 'Свободно') {
                        cell.classList.add('free');
                        cell.innerText = "Свободно";
                    }

                    // ЛОГИКА КЛИКА
                    cell.onclick = () => {
                        if (role === 'tutor') {
                            // Меню для репетитора (упрощенное)
                            const newStatus = confirm(`Изменить статус ${day} ${hour}?\nOK — Сделать СВОБОДНЫМ\nОтмена — НЕ РАБОТАЮ`);
                            const actionType = newStatus ? 'free' : 'not_working';
                            
                            tg.sendData(JSON.stringify({
                                action: 'update_status', 
                                id: slot.id, 
                                status: actionType,
                                time: `${day} ${hour}`
                            }));
                            tg.close();
                        } else if (role === 'student' && slot.status === 'Свободно') {
                            // Обычная запись для студента
                            tg.sendData(JSON.stringify({
                                action: 'book', 
                                id: slot.id, 
                                time: `${day} ${hour}`
                            }));
                            tg.close();
                        }
                    };
                }
                container.appendChild(cell);
            });
        });
    </script>
</body>
</html>
