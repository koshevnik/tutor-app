<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: grid; grid-template-columns: 60px repeat(7, 1fr); }
        .cell { border: 1px solid #ddd; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; }
        .time { background: #eee; font-weight: bold; }
        .busy { background: #ccc; font-weight: bold; } /* Серый цвет */
        .selected { background: #ffcdd2; color: #b71c1c; } /* Красный для студента */
    </style>
</head>
<body>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role');
    const busyList = (params.get('busy') || "").split(',');

    for (let h = 9; h <= 18; h++) {
        document.body.innerHTML += `<div class="cell time">${h}:00</div>`;
        for (let d = 0; d < 7; d++) {
            let isBusy = busyList.includes(h.toString());
            let cls = isBusy ? 'cell busy' : 'cell';
            let txt = isBusy ? 'Не работает' : '';
            document.body.innerHTML += `<div id="c${d}${h}" class="${cls}" onclick="tap(${d},${h})">${txt}</div>`;
        }
    }

    function tap(d, h) {
        let el = document.getElementById(`c${d}${h}`);
        if (role === 'tutor') {
            let nowBusy = !el.classList.contains('busy');
            el.className = nowBusy ? 'cell busy' : 'cell';
            el.innerText = nowBusy ? 'Не работает' : '';
            tg.sendData(`EDIT:${h}:${nowBusy ? 'busy' : 'free'}`);
        } else if (!el.classList.contains('busy')) {
            el.className = 'cell selected';
            el.innerText = 'Занято';
            tg.sendData(`BOOK:${h}:occupied`);
        }
    }
</script>
</body>
</html>
