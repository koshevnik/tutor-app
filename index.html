<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #0088cc; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>
    <h3>Выберите время занятия</h3>
    <input type="datetime-local" id="timeInput">
    <button onclick="send()">Записаться</button>

    <script>
        const tg = window.Telegram.WebApp;
        function send() {
            const val = document.getElementById('timeInput').value;
            if (!val) return alert("Выберите время!");
            tg.sendData(val); // Отправляем строку с датой обратно в бот
            tg.close();
        }
    </script>
</body>
</html>
