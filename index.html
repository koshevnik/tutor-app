<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; user-select: none; }
        .header {
            display: grid;
            grid-template-columns: 50px repeat(7, 1fr);
            background: #fff;
            border-top: 5px solid #28a745;
            position: sticky; top: 0; z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-cell { padding: 8px 2px; text-align: center; font-size: 10px; border-right: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); grid-auto-rows: 60px; }
        .time-label { font-size: 11px; color: #888; text-align: center; padding-top: 5px; border-bottom: 1px solid #f9f9f9; }
        
        .slot { border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 4px; font-size: 9px; cursor: pointer; }
        
        /* Цвета согласно ТЗ и скриншоту */
        .free { background: #fff; } 
        .busy { background: #d3d3d3; color: #555; } /* Серый - Репетитор отдыхает */
        .occupied { background: #ffcdd2; border-left: 3px solid #d32f2f; color: #b71c1c; } /* Красный - Занято другим */
        .my-booking { background: #e8f5e9; border-left: 3px solid #28a745; } /* Зеленый - Твоя запись */
    </style>
</head>
<body>
    <div class="header" id="header-days">
        <div class="header-cell"></div>
    </div>
    <div class="grid" id="main-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получаем параметры из URL (роль и ID)
        const params = new URLSearchParams(window.location.search);
        const userRole = params.get('role') || 'student';
        const tutorId = params.get('tutor_id');

        const days = ['пн', 'вт', 'ср', 'чт', 'пт', 'сб', 'вс'];
        const dates = ['04.05', '05.05', '06.05', '07.05', '08.05', '09.05', '10.05'];

        // Отрисовка шапки
        const header = document.getElementById('header-days');
        days.forEach((day, i) => {
            const div = document.createElement('div');
            div.className = 'header-cell';
            div.innerHTML = `<b>${day}</b><br>${dates[i]}`;
            header.appendChild(div);
        });

        // Отрисовка сетки
        const grid = document.getElementById('main-grid');
        for (let h = 8; h <= 20; h++) {
            const time = document.createElement('div');
            time.className = 'time-label';
            time.innerText = `${h}:00`;
            grid.appendChild(time);

            for (let d = 0; d < 7; d++) {
                const slot = document.createElement('div');
                slot.className = 'slot free';
                
                // Пример данных (в реальном проекте они будут грузиться из БД)
                if (h < 10) slot.classList.add('busy'); 

                slot.onclick = () => {
                    if (userRole === 'tutor') {
                        // Логика репетитора: переключение Свободно/Выходной
                        slot.classList.toggle('busy');
                        const status = slot.classList.contains('busy') ? 'busy' : 'free';
                        tg.sendData(`EDIT:${d}:${h}:${status}`);
                    } else {
                        // Логика студента: запись
                        if (slot.classList.contains('free')) {
                            slot.className = 'slot my-booking';
                            slot.innerHTML = '<b>Записано</b>';
                            tg.sendData(`BOOK:${d}:${h}`);
                        } else {
                            tg.showAlert("Это время занято или недоступно!");
                        }
                    }
                };
                grid.appendChild(slot);
            }
        }
    </script>
</body>
</html>
