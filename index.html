<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; }
        .header { display: grid; grid-template-columns: 50px repeat(7, 1fr); border-top: 4px solid #28a745; position: sticky; top: 0; background: white; }
        .header-cell { padding: 5px; text-align: center; font-size: 10px; border-right: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); grid-auto-rows: 65px; }
        .time { font-size: 10px; color: #999; text-align: center; border-bottom: 1px solid #f9f9f9; padding-top: 5px; }
        .slot { border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 4px; font-size: 9px; cursor: pointer; }
        .free { background: #fff; }
        .busy { background: #e0e0e0; color: #777; } /* Серый */
        .occupied { background: #ffebee; color: #c62828; } /* Красный */
    </style>
</head>
<body>
    <div class="header" id="h"></div>
    <div class="grid" id="g"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');

        const days = ['пн','вт','ср','чт','пт','сб','вс'];
        const hDiv = document.getElementById('h');
        hDiv.innerHTML = '<div class="header-cell"></div>' + days.map(d => `<div class="header-cell"><b>${d}</b></div>`).join('');

        const gDiv = document.getElementById('g');
        for (let hr = 9; hr <= 19; hr++) {
            const t = document.createElement('div');
            t.className = 'time'; t.innerText = hr + ':00';
            gDiv.appendChild(t);

            for (let d = 0; d < 7; d++) {
                const s = document.createElement('div');
                s.className = 'slot free';
                s.onclick = () => {
                    if (role === 'tutor') {
                        s.classList.toggle('busy');
                        const isBusy = s.classList.contains('busy');
                        s.innerHTML = isBusy ? '09:00-15:00<br><b>Не работает</b>' : '';
                        tg.sendData(`EDIT:${d}:${hr}:${isBusy ? 'busy' : 'free'}`);
                    } else if (s.classList.contains('free')) {
                        s.className = 'slot occupied';
                        s.innerHTML = '<b>Занято</b>';
                        tg.sendData(`BOOK:${d}:${hr}:occupied`);
                    }
                };
                gDiv.appendChild(s);
            }
        }
    </script>
</body>
</html>
