<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #fff; }
        .header-row {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            background: #f0f0f0;
            border-bottom: 2px solid #28a745;
            position: sticky; top: 0; z-index: 10;
        }
        .header-cell {
            padding: 10px 5px; text-align: center; font-size: 12px;
            border-right: 1px solid #ddd;
        }
        .schedule-grid {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            grid-auto-rows: 50px;
        }
        .time-cell {
            border-bottom: 1px solid #eee; border-right: 1px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: #666;
        }
        .slot {
            border-bottom: 1px solid #eee; border-right: 1px solid #ddd;
            font-size: 10px; padding: 4px; overflow: hidden; cursor: pointer;
        }
        /* Цвета как на скрине */
        .status-busy { background-color: #c4c4c4; color: #333; } /* Не работает */
        .status-free { background-color: #fff; } /* Свободно */
        .status-occupied { background-color: #d1e7dd; border-left: 3px solid #198754; } /* Записан ученик */
        
        .slot-info { font-weight: bold; margin-bottom: 2px; }
    </style>
</head>
<body>
    <!-- Шапка с датами (как на image_773209.png) -->
    <div class="header-row">
        <div class="header-cell">Время</div>
        <div class="header-cell">пн, 04.05<br><b>Кошевник Е.</b></div>
        <div class="header-cell">вт, 05.05<br><b>Кошевник Е.</b></div>
        <div class="header-cell">ср, 06.05<br><b>Кошевник Е.</b></div>
        <div class="header-cell">чт, 07.05<br><b>Кошевник Е.</b></div>
        <div class="header-cell">пт, 08.05<br><b>Кошевник Е.</b></div>
        <div class="header-cell">сб, 09.05<br><b>Кошевник Е.</b></div>
        <div class="header-cell">вс, 10.05<br><b>Кошевник Е.</b></div>
    </div>

    <div class="schedule-grid" id="grid">
        <!-- Сетка будет заполняться JavaScript -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        const grid = document.getElementById('grid');
        const days = 7;
        const startHour = 8;
        const endHour = 20;

        for (let h = startHour; h <= endHour; h++) {
            // Колонка времени
            const timeDiv = document.createElement('div');
            timeDiv.className = 'time-cell';
            timeDiv.innerText = h + ':00';
            grid.appendChild(timeDiv);

            // Слоты для каждого дня
            for (let d = 0; d < days; d++) {
                const slot = document.createElement('div');
                slot.className = 'slot status-free';
                
                // Пример заполнения как на скриншоте для Пн 9:00
                if (d === 0 && h === 9) {
                    slot.className = 'slot status-busy';
                    slot.innerHTML = '<div class="slot-info">09:00-15:00</div>Не работает';
                }

                slot.onclick = () => {
                    const data = `День: ${d}, Время: ${h}:00`;
                    tg.sendData(data); // Отправка данных боту
                    tg.close();
                };
                grid.appendChild(slot);
            }
        }
    </script>
</body>
</html>
