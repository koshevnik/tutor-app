<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: grid; grid-template-columns: 50px repeat(7, 1fr); }
        .cell { border: 1px solid #eee; height: 50px; font-size: 10px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .busy { background: #ccc; font-weight: bold; } /* Серый */
        .time { color: #888; background: #f9f9f9; }
    </style>
</head>
<body>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const p = new URLSearchParams(window.location.search);
        const role = p.get('role');
        const busy = (p.get('busy') || "").split(',');

        for (let h = 9; h <= 18; h++) {
            document.body.innerHTML += `<div class="cell time">${h}:00</div>`;
            for (let d = 0; d < 7; d++) {
                let isBusy = busy.includes(h.toString());
                let style = isBusy ? 'busy' : '';
                let text = isBusy ? 'Не работает' : '';
                
                document.body.innerHTML += `<div id="s${d}${h}" class="cell ${style}" onclick="clickSlot(${d},${h})">${text}</div>`;
            }
        }

        function clickSlot(d, h) {
            let s = document.getElementById(`s${d}${h}`);
            if (role === 'tutor') {
                let isNowBusy = !s.classList.contains('busy');
                s.className = isNowBusy ? 'cell busy' : 'cell';
                s.innerText = isNowBusy ? 'Не работает' : '';
                tg.sendData(`EDIT:${h}:${isNowBusy ? 'busy' : 'free'}`);
            } else if (!s.classList.contains('busy')) {
                s.style.background = 'red';
                s.innerText = 'Занято';
                tg.sendData(`BOOK:${h}:occupied`);
            }
        }
    </script>
</body>
</html>
