<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); gap: 1px; background: #ccc; border: 1px solid #ccc; }
        .cell { background: white; min-height: 45px; padding: 2px; font-size: 10px; border: 0.5px solid #eee; text-align: center; }
        .header { background: #f8f9fa; font-weight: bold; height: 30px; display: flex; align-items: center; justify-content: center; }
        
        /* Стили как на скрине */
        .not-working { background: #d1d1d1; color: #757575; }
        .busy { background: #fff3e0; color: #e65100; border-left: 3px solid #ff9800; }
        .free { background: white; cursor: pointer; }
        .free:active { background: #e3f2fd; }
        
        .time-label { background: #f8f9fa; font-weight: bold; }
    </style>
</head>
<body>
    <div class="grid" id="calendar">
        <!-- Заголовки -->
        <div class="cell header"></div>
        <div class="cell header">Пн</div><div class="cell header">Вт</div><div class="cell header">Ср</div>
        <div class="cell header">Чт</div><div class="cell header">Пт</div><div class="cell header">Сб</div><div class="cell header">Вс</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Функция для отправки выбора обратно в бот
        function selectSlot(slotId, time) {
            tg.sendData(JSON.stringify({
                action: 'book',
                id: slotId,
                time: time
            }));
        }
    </script>
</body>
</html>
